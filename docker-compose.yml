version: "3.9"

services:
  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: digital_sp
    ports:
      - "5433:5432"

  app:
    build: .
    depends_on: 
      - db
    environment:
      DB_PORT: 5432
      DB_NAME: digital_sp
      DB_PASSWORD: postgres
      DB_USER: postgres
      DB_HOST: db
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app